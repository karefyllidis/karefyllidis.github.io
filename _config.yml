  bio: "Oxford PhD engineer and 2025 ASME IGTI John P. Davis Award recipient. I design and deploy multi-physics simulation frameworks and physics-informed ML — building digital twins, surrogate models, and production HPC toolchains that close the gap between high-fidelity computation and real operating data. My work spans turbomachinery aerodynamics, reacting flows, and scientific ML (PINNs, PI-RNNs, symbolic regression, Monte Carlo UQ), applied across energy, aerospace, and process industries. The consistent output is translating rigorous simulation into evidence that shapes investment and scale-up decisions."
  founder_profile: "I build end-to-end simulation and scientific ML toolchains — from high-fidelity multiphysics models and terabyte-scale HPC campaigns through to reduced-order surrogates, physics-informed neural networks, and symbolic rate closures validated against real plant data. Every project is oriented toward the same goal: turning computational rigour into decisions that count."
