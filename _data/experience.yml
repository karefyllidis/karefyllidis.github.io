- role: "Senior Aerodynamics Engineer"
  org: "Coolbrook Technologies"
  period: "Aug 2023 – present"
  url: "https://www.coolbrook.com"
  summary: "Commercialised PhD research into live production workflows and leads techno-commercial and R&D strategy for industrial decarbonisation hardware, applying ML and simulation. Built a physics-based reactor model — legacy design code coupled with detailed chemical kinetics — giving real-time yield prediction, now embedded in live design workflows and validated against first-of-a-kind pilot data."
  highlights:
    - "Commercialised PhD research into production: built a physics-based reactor model coupling legacy design code with detailed chemical kinetics for real-time yield prediction, now embedded in live design workflows."
    - "Implemented PyTorch surrogates to replace slow simulations — cutting design-iteration time and derisking investment decisions, including a solver-integration partnership with a commercial CFD vendor."
    - "Validated high-fidelity CFD and surrogate models against live plant data from the first-of-a-kind turbo-reactor pilot — closing the offline-to-online gap between production HPC simulation and real operating conditions."
    - "Led techno-commercial assessments and paid feasibility studies for major industrial operators — turning experimental, plant, and simulation evidence into client-ready risk and scale-up assessments and C-suite briefings."
    - "Quantified operating-envelope risk before scale-up with Monte Carlo UQ across coupled mechanical, process, and controls subsystems; drafted patents on next-generation turbo-reactor platforms."

- role: "Visiting AI Researcher"
  org: "University of Oxford, Dept. of Engineering Science"
  period: "Sep 2024 – present"
  url: "https://eng.ox.ac.uk"
  summary: "Post-PhD research focused on scientific ML, run in parallel with full-time work at Coolbrook. Built NeSC (Neuro-Symbolic Closure): an end-to-end pipeline that turns HPC-scale physics-simulation data into fast, interpretable ML surrogates for reaction chemistry too expensive to compute directly."
  highlights:
    - "Generated a multi-million-row training dataset from HPC-scale physics-simulation campaigns using SLURM-parallelised Latin-hypercube design-of-experiments — training fast ML surrogates for chemistry too expensive to compute directly."
    - "Engineered features with leakage-safe, run-grouped splits and domain-driven dimensionality reduction (species lumping), compressing up to ~2,000 species into 9 chemistry lumps."
    - "Trained a physics-informed neural network (PINN) and distilled it via symbolic regression (PySR, SymTorch) into compact, human-readable, physically consistent rate laws that couple directly into a CFD solver — holdout-validated, manuscript in preparation for Nature Communications."
    - "Delivered meanline-cantera: 1D multi-stage turbo-reactor solver with inline Cantera chemistry, multi-objective optimisation, and Latin-hypercube DOE — producing validated performance maps and surrogate training datasets."
    - "Co-supervised a PhD researcher on experimental supersonic aerodynamics and heat transfer."

- role: "PhD Researcher"
  org: "Oxford Thermofluids Institute"
  period: "Sep 2019 – Aug 2024"
  url: "https://oti.eng.ox.ac.uk"
  summary: "Industry-sponsored PhD on novel turbomachinery architectures for industrial hydrocarbon cracking — produced the aerothermal design foundation and TB-scale simulation evidence base later validated at petrochemical pilot scale. Lead author on three award-winning papers (ASME John P. Davis 2025; ASME Turbomachinery Best Paper 2024; GPPS Best Paper 2024)."
  highlights:
    - "Built an ML surrogate for steam-cracking PFR simulation — benchmarked tree ensembles (RF, GBT, XGBoost) against a PyTorch MLP, holdout-validated across operating conditions and feedstocks, accelerating trade studies by ~500×."
    - "Designed axial, radial, mixed-flow, and regenerative turbo-reactor architectures across TB-scale HPC campaigns (~1,000 cores; ARC, CSD3, Rescale) — simulation set geometry, stage loading, and operating conditions that fed directly into the commercial product."
    - "Applied Bayesian optimisation to tune turbulence-model and simulation parameters against experimental data — cutting full HPC runs needed for convergence and quantifying prediction uncertainty across the design space."
    - "Delivered research to production without discontinuity: surrogate and reduced-order models from this Coolbrook-sponsored programme ran on the commercial pilot."

