- role: "Senior Aerodynamics Engineer"
  org: "Coolbrook Technologies"
  period: "Aug 2023 – present"
  url: "https://www.coolbrook.com"
  summary: "Built and deployed a multi-physics digital twin for a novel turbo-reactor from PhD-stage design through to live petrochemical pilot — spanning TB-scale HPC simulation, model-to-plant validation, Monte Carlo UQ across coupled subsystems, and patent filings. Translated simulation results into investment-grade evidence packages that informed go/no-go and scale-up decisions at executive and partner level with major petrochemical partners."
  highlights:
    - "Validated high-fidelity CFD and surrogate models against live plant data from the first-of-a-kind turbo-reactor pilot — closed the offline-to-online gap between production HPC simulation and real operating conditions."
    - "Built reduced-order and neural-network surrogates against high-fidelity CFD and pilot results — cut design-iteration time for product decisions."
    - "Quantified operating-envelope risk before scale-up: Monte Carlo UQ across coupled mechanical, process, and controls subsystems."
    - "Drafted patents on next-generation turbo-reactor platforms."

- role: "Visiting Researcher"
  org: "University of Oxford, Dept. of Engineering Science"
  period: "Sep 2024 – Sep 2025"
  url: "https://eng.ox.ac.uk"
  summary: "Built two physics-informed ML and simulation toolchains at Oxford: NeSC (Neuro-Symbolic Closure — PINNs, PI-RNNs, and symbolic regression for pyrolysis chemistry) and a multi-stage turbo-reactor meanline solver with Cantera chemistry, Bayesian optimisation, and Pareto-front multi-objective optimisation."
  highlights:
    - "Built NeSC: generated a multi-million-row Cantera PFR training set via SLURM-parallelised Latin-hypercube DOE, lumped ~2,000 species into 9 chemistry groups, then distilled a PINN into human-readable symbolic rate laws (PySR, SymTorch) that couple directly into a CFD solver — holdout-validated, manuscript in preparation for Nature Communications."
    - "Delivered meanline-cantera: 1D multi-stage turbo-reactor solver with inline Cantera chemistry, multi-objective optimisation, and Latin-hypercube DOE — producing validated performance maps and surrogate training datasets."
    - "Co-supervised a PhD researcher on experimental supersonic aerodynamics and heat transfer."

- role: "PhD Researcher"
  org: "Oxford Thermofluids Institute"
  period: "Sep 2019 – Aug 2024"
  url: "https://oti.eng.ox.ac.uk"
  summary: "Industry-sponsored PhD on novel turbomachinery architectures for industrial hydrocarbon cracking — produced the aerothermal design foundation and TB-scale simulation evidence base later validated at petrochemical pilot scale. Lead author on three award-winning papers (ASME John P. Davis 2025; ASME Turbomachinery Best Paper 2024; GPPS Best Paper 2024)."
  highlights:
    - "Built an ML surrogate for steam-cracking PFR simulation — benchmarked tree ensembles (RF, GBT, XGBoost) against a PyTorch MLP, holdout-validated across operating conditions and feedstocks, accelerating trade studies by ~500×."
    - "Designed axial, radial, mixed-flow, and regenerative turbo-reactor architectures across TB-scale HPC campaigns (~1,000 cores; ARC, CSD3, Rescale) — simulation set geometry, stage loading, and operating conditions that fed directly into the commercial product."
    - "Applied Bayesian optimisation to tune turbulence-model and simulation parameters against experimental data — cutting full HPC runs needed for convergence and quantifying prediction uncertainty across the design space."
    - "Delivered research to production without discontinuity: surrogate and reduced-order models from this Coolbrook-sponsored programme ran on the commercial pilot."

- role: "Testing Engineer"
