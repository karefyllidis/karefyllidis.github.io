- category: phd
  title: "Novel Turbo-Heater & Turbo-Reactor Aerodynamics"
  period: "Oxford PhD, 2019–2024"
  description: "Aerothermal design of axial, radial, mixed-flow, and regenerative turbo-heaters/reactors for hydrocarbon cracking — the core PhD thesis on high-enthalpy gas heating for industrial decarbonisation. The aerodynamic foundations developed here were later validated at petrochemical pilot scale."
  tags:
    - Turbomachinery
    - Supersonic Flows
    - Reacting Flows
  link_label: "PhD Thesis"
