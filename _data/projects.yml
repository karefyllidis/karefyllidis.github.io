- category: open_source
  title: "SEBO — Sample-Efficient Bayesian Optimizer"
  period: "Independent (2025)"
  description: "Bayesian optimizer built from scratch and published to PyPI. GP surrogate with competing kernels (RBF, Matérn ν=1.5) selected each round by log-marginal likelihood; ensemble acquisition (EI, PI, UCB) falls back to the centroid when the three disagree; log/Box-Cox output warping for objectives spanning orders of magnitude. Benchmarked against Optuna-TPE and TuRBO on 6 synthetic functions; originally written for the NeurIPS 2020 BBO Challenge."
  tags:
    - Python
    - Gaussian Processes
    - Bayesian Optimisation
    - PyPI
  github: "https://github.com/karefyllidis/SEBO"
  link_url: "https://pypi.org/project/sebo/"
  link_label: "PyPI"


- category: ind_active
