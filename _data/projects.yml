- category: phd
  title: "PhD Simulation & Design Stack"
  period: "Oxford PhD"
  description: "In-house Fortran/MPI CFD with parallel LES on ARC and CSD3; hybrid SAS Spalart–Allmaras turbulence model calibrated via Bayesian optimisation; supersonic rotor and stator design codes using the method of characteristics for ultra-high-loading stages."
  tags:
    - Fortran / OpenMPI
    - LES
    - HPC (ARC, CSD3, Rescale)
    - Method of Characteristics

- category: oxford
  title: "NeSC — Neuro-Symbolic Closure"
  period: "Oxford (Visiting Researcher)"
  description: "Proprietary neuro-symbolic ML workspace for pyrolysis chemistry. A SLURM-parallelised Latin-hypercube campaign builds a multi-million-row Cantera plug-flow-reactor database; leakage-safe run-grouped splits and species lumping compress ~2,000 species into 9 chemistry groups. A PINN is distilled via symbolic regression (PySR, SymTorch) into compact, human-readable rate laws that couple directly into a CFD solver — holdout-validated end-to-end, with a manuscript in preparation for Nature Communications."
  tags:
    - PyTorch
    - PINN / PI-RNN
    - Symbolic Regression (PySR / SymTorch)
    - Cantera
    - HPC / SLURM
  proprietary: true

- category: oxford
  title: "Multi-Stage Meanline Toolchain — Reacting Flow Extension"
  period: "Oxford (Visiting Researcher)"
  description: "Extended the Oxford Thermofluids Institute's in-house multi-stage aerodynamics meanline code with Cantera reacting-flow chemistry, Bayesian optimisation, and Pareto-front genetic-algorithm multi-objective optimisation, plus holdout-validated surrogate models for rapid performance screening of turbo-reactor stages."
  tags:
    - Meanline Methods
    - Cantera
    - Fortran / Python
    - Bayesian Optimisation
    - Multi-Objective GA (Pareto)
    - Performance Screening

- category: open_source
  title: "PlugFlowML"
  period: "Independent (2025)"
  description: "Open-source, MIT-licensed 10-lesson graduate course teaching ML surrogate modelling for physical simulation on reactor chemistry — tree ensembles, neural nets, PINNs, symbolic regression, and Bayesian optimisation, from Cantera-generated plug-flow-reactor data through to a distilled symbolic surrogate. Runs end-to-end on free Colab against a shared sample dataset."
  tags:
    - PyTorch
    - PINNs
    - Symbolic Regression (PySR)
    - Cantera
    - Bayesian Optimisation
  github: "https://github.com/karefyllidis/PlugFlowML"

- category: open_source
  title: "SEBO — Sample-Efficient Bayesian Optimizer"
  period: "Independent (2025)"
  description: "Sample-efficient Bayesian optimiser built from scratch and published to PyPI. GP surrogate with competing kernels (RBF, Matérn ν=1.5) chosen each round by log-marginal likelihood; ensemble acquisition (EI/PI/UCB) with log/Box-Cox output warping for objectives spanning orders of magnitude. Benchmarked against Optuna-TPE and TuRBO on 6 synthetic functions; originally written for the NeurIPS 2020 BBO Challenge."
  tags:
    - Python
    - Gaussian Processes
    - Bayesian Optimisation
    - PyPI
  github: "https://github.com/karefyllidis/SEBO"
  link_url: "https://pypi.org/project/sebo/"
  link_label: "PyPI"


- category: ind_active
  title: "Super Rotor Designer"
  period: "Oxford PhD, extended 2025–present"
  description: "End-to-end supersonic impulse-rotor design workflow: parametric blade geometry from a method-of-characteristics solver, aerodynamic evaluation in MISES, and a reinforcement learning loop that perturbs mid-chord and passage geometry while keeping the leading and trailing edges fixed. MOC output feeds directly into MISES; RL reward comes from the cascade performance metrics."
  tags:
    - Python
    - MATLAB
    - Method of Characteristics
    - MISES
    - Reinforcement Learning


