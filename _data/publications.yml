- journal_short: "ASME JT"
  title: "A Novel Axial Energy-Imparting Turbomachine for High-Enthalpy Gas Heating: Robustness of the Aerodynamic Design"
  award: "Best Paper Award"
  authors:
    - name: "Nikolas Karefyllidis"
      self: true
    - name: "Dylan Rubini"
    - name: "Budimir Rosic"
    - name: "Liping Xu"
    - name: "Veli-Matti Purola"
  venue: "ASME Journal of Turbomachinery"
  date: "Nov 2023"
  doi: "10.1115/1.4063928"
  url: "https://doi.org/10.1115/1.4063928"
  abstract: "Hard-to-abate industrial processes have long been considered technically challenging to decarbonize. A new class of energy-imparting turbomachines converts mechanical into internal energy instead of pressurizing the gas, enabling high-temperature gas heating for a variety of applications. This work demonstrates the capabilities of a novel, high-capacity, repeating-stage axial turbo-heater architecture and presents detailed numerical simulations confirming the robustness and flexibility of the aerodynamic design despite employing a uniform blade design."
